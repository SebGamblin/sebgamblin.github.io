<script>
// Envoi du markdown à l'iframe
document.getElementById('moteur-iframe').addEventListener('load', function() {
  var raw = document.getElementById('cours-md').innerHTML;
  var txt = document.createElement('textarea');
  txt.innerHTML = raw;
  this.contentWindow.postMessage({ type: 'cours-md', content: txt.value }, '*');
});

// Redimensionnement automatique de l'iframe selon la hauteur du contenu
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'resize-iframe') return;
  var iframe = document.getElementById('moteur-iframe');
  iframe.style.height = (e.data.height + 20) + 'px';
});
</script>
