<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moteur cours ISEN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.8.0/build/styles/github.min.css">
<style>
:root{--brand:#c0392b;--brand-dark:#96281b;--brand-light:#fadbd8;--brand-faint:#fdf2f1;--ink:#1a1a2e;--ink-2:#3d3d5c;--ink-3:#7a7a99;--rule:#e4e4ef;--surface:#f8f8fc;--white:#ffffff;--code-bg:#f4f4f8;--code-border:#dcdce8;--font-sans:'DM Sans',sans-serif;--font-display:'DM Serif Display',serif;--font-mono:'DM Mono',monospace;--radius:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--surface);color:var(--ink);line-height:1.7;font-size:16px}
#toolbar{position:fixed;top:12px;right:12px;display:flex;gap:8px;z-index:9999}
.toolbar-btn{font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-2);background:var(--white);border:1.5px solid var(--rule);border-radius:999px;padding:6px 16px;cursor:pointer;transition:all .18s ease;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.toolbar-btn:hover{background:var(--brand);border-color:var(--brand);color:white;box-shadow:0 4px 14px rgba(192,57,43,.25);transform:translateY(-1px)}
.toolbar-btn.active{background:var(--brand);border-color:var(--brand);color:white}
#doc{display:none;max-width:820px;margin:0 auto;padding:70px 40px 120px}
#doc>h1:first-child{font-family:var(--font-display);font-size:clamp(2rem,5vw,3rem);font-weight:400;color:var(--white);background-image:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);border-radius:var(--radius);padding:2.5rem 3rem;margin-bottom:2.5rem;line-height:1.2;box-shadow:0 8px 32px rgba(192,57,43,.18);position:relative;overflow:hidden}
#doc>h1:first-child::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06)}
#doc h1{font-family:var(--font-display);font-size:1.7rem;font-weight:400;color:var(--brand);border-bottom:2px solid var(--brand-light);padding-bottom:.4rem;margin:3rem 0 1rem}
#doc h2{font-size:1.25rem;font-weight:600;color:var(--ink);border-left:4px solid var(--brand);padding-left:.75rem;margin:2.2rem 0 .8rem}
#doc h3{font-size:1.05rem;font-weight:600;color:var(--ink-2);margin:1.8rem 0 .5rem}
#doc p{font-size:1rem;color:var(--ink-2);margin-bottom:1rem}
#doc ul,#doc ol{padding-left:1.5rem;margin-bottom:1rem}
#doc li{font-size:1rem;color:var(--ink-2);margin-bottom:.35rem;line-height:1.65}
#doc ul li::marker{color:var(--brand)}
#doc code{font-family:var(--font-mono);font-size:.875em;background:var(--code-bg);color:var(--brand-dark);padding:.15em .45em;border-radius:5px;border:1px solid var(--code-border)}
#doc pre{background:var(--code-bg);border:1px solid var(--code-border);border-radius:var(--radius);padding:1.25rem 1.5rem;overflow-x:auto;margin:1.25rem 0;box-shadow:0 2px 8px rgba(0,0,0,.04);position:relative}
#doc pre code{font-family:var(--font-mono);font-size:.9rem;background:transparent;border:none;padding:0;color:var(--ink)}
#doc pre[data-lang]::before{content:attr(data-lang);position:absolute;top:8px;right:12px;font-family:var(--font-mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);background:var(--white);border:1px solid var(--code-border);border-radius:4px;padding:2px 7px}
#doc blockquote{border-left:4px solid var(--brand);background:var(--brand-faint);border-radius:0 var(--radius) var(--radius) 0;padding:1rem 1.25rem;margin:1.25rem 0;color:var(--ink-2);font-style:italic}
#doc hr{display:none}
#doc table{width:100%;border-collapse:collapse;margin:1.25rem 0;font-size:.95rem}
#doc th{background:var(--brand);color:white;font-weight:600;padding:.6rem 1rem;text-align:left}
#doc td{padding:.5rem 1rem;border-bottom:1px solid var(--rule);color:var(--ink-2)}
#doc tr:nth-child(even) td{background:var(--brand-faint)}
#doc strong{color:var(--ink);font-weight:600}
#doc em{color:var(--ink-2)}
#doc>h1:first-child+p,#doc>h1:first-child+p+p{color:var(--ink-3);font-size:.9rem;text-align:center;margin-bottom:.2rem}
.reveal{display:none}
.reveal,.reveal body{background:var(--white)}
.reveal .controls{color:var(--rule)}
.reveal .progress{background:var(--brand-light);color:var(--brand);height:4px}
.reveal .slides section{font-family:var(--font-sans);text-align:left;padding:2rem 3.5rem !important;height:100%;display:flex !important;flex-direction:column;justify-content:flex-start;padding-top:4rem !important}
.reveal h1{font-family:var(--font-display);font-size:2.4em;font-weight:400;color:white;background:linear-gradient(135deg,var(--brand),var(--brand-dark));border-radius:var(--radius);padding:.6em .9em;margin:auto 0;line-height:1.2;text-align:center !important;box-shadow:0 8px 28px rgba(192,57,43,.2)}
.reveal h2{font-size:1.1em;font-weight:600;color:white;background:linear-gradient(90deg,var(--brand) 0%,var(--brand-dark) 100%);position:absolute;top:0;left:0;right:0;width:100%;margin:0;padding:.55em 3.5rem;box-sizing:border-box}
.reveal .slide-number{font-family:var(--font-mono);font-size:11px;background:transparent;color:var(--ink-3)}
.reveal p{font-size:1em;color:var(--ink-2);margin-bottom:.75em;text-align:left;line-height:1.6}
.reveal ul,.reveal ol{margin:0 0 .6em 0;padding-left:1.5em;display:block}
.reveal li{font-size:.98em;color:var(--ink-2);margin-bottom:.55em;line-height:1.5;list-style-position:outside}
.reveal ul li::marker{color:var(--brand);font-size:1.2em}
.reveal ul ul,.reveal ol ol,.reveal ul ol,.reveal ol ul{margin-top:.35em;margin-left:1em}
.reveal ul ul li,.reveal ol ol li{font-size:.9em;color:var(--ink-3)}
.reveal ul ul li::marker{color:var(--brand-dark)}
.reveal code{font-family:var(--font-mono);font-size:.88em;background:var(--code-bg);color:var(--brand-dark);padding:.15em .45em;border-radius:5px;border:1px solid var(--code-border)}
.reveal pre{font-family:var(--font-mono);font-size:.88em;line-height:1.5;background:var(--code-bg);border:1px solid var(--code-border);border-radius:var(--radius);padding:1rem 1.4rem;margin:.75em auto;width:96%;box-shadow:0 2px 10px rgba(0,0,0,.05);text-align:left;overflow:auto;position:relative}
.reveal pre code{background:transparent;border:none;padding:0;font-size:1em;color:var(--ink);font-family:var(--font-mono)}
.reveal blockquote{border-left:4px solid var(--brand);background:var(--brand-faint);border-radius:0 var(--radius) var(--radius) 0;padding:.8rem 1.1rem;margin:.8em 0;font-style:italic;font-size:.95em;color:var(--ink-2);width:96%}
.reveal strong{color:var(--ink);font-weight:600}
.reveal em{color:var(--brand-dark)}
.reveal table{font-size:.8em}
.reveal th{background:var(--brand);color:white;padding:.4em .8em}
.reveal td{padding:.35em .8em;border-bottom:1px solid var(--rule)}
.reveal tr:nth-child(even) td{background:var(--brand-faint)}
.reveal div.thm,#doc div.thm{background:var(--brand-faint);border-radius:var(--radius);border:1px solid var(--brand-light);overflow:hidden;margin:1rem 0;box-shadow:0 2px 8px rgba(192,57,43,.08)}
.reveal div.thm h3,#doc div.thm h3{background:var(--brand);color:white;font-size:.85em;font-weight:600;padding:.5em 1em;margin:0;letter-spacing:.04em;text-transform:uppercase}
.reveal div.thm p,.reveal div.thm li,#doc div.thm p,#doc div.thm li{padding:.2em 1em;margin:0}
.copy-btn{position:absolute;top:8px;right:8px;display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--ink-3);background:var(--white);border:1px solid var(--code-border);border-radius:6px;padding:3px 9px;cursor:pointer;opacity:0;transition:opacity .15s ease,background .15s ease,color .15s ease;z-index:10;user-select:none;line-height:1.6}
@media(hover:none){.copy-btn{opacity:1}}
pre:hover .copy-btn{opacity:1}
.copy-btn:hover{background:var(--brand);border-color:var(--brand);color:white}
.copy-btn.copied{background:#27ae60;border-color:#27ae60;color:white;opacity:1}
.copy-btn svg{width:12px;height:12px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mermaid{display:flex;justify-content:center;margin:1rem auto}
@media print{*{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}.copy-btn,#toolbar{display:none !important}.reveal{display:none !important}body{background:white;font-size:11pt}#doc{display:block !important;max-width:100%;padding:0;margin:0}#doc>h1:first-child{background-image:linear-gradient(135deg,var(--brand),var(--brand-dark)) !important;page-break-after:always}#doc h1:not(:first-child){page-break-before:always}#doc pre{page-break-inside:avoid}#doc h2,#doc h3{page-break-after:avoid}#doc th{background:var(--brand) !important;color:white !important}#doc div.thm h3{background:var(--brand) !important;color:white !important}}
#error-banner{display:none;background:#fff3cd;border:1px solid #ffc107;border-radius:var(--radius);padding:1rem 1.5rem;margin:5rem auto 0;max-width:700px;font-size:.95rem;color:#856404;text-align:center}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>mermaid.initialize({startOnLoad:false,theme:'base',themeVariables:{primaryColor:'#fadbd8',primaryBorderColor:'#c0392b',primaryTextColor:'#1a1a2e'}});</script>

<div id="toolbar">
  <button class="toolbar-btn" onclick="switchMode()" id="modeBtn">&#9654; Slides</button>
  <button class="toolbar-btn" onclick="printDoc()">&#11015; PDF cours</button>
  <button class="toolbar-btn" onclick="printSlides()">&#11015; PDF slides</button>
  <button class="toolbar-btn" onclick="toggleFullscreen()">&#9974; Plein écran</button>
</div>

<div id="error-banner">
  ⚠️ Contenu introuvable. La page Moodle doit contenir
  <code>&lt;div id="cours-md"&gt;...markdown...&lt;/div&gt;</code>.
</div>

<div id="doc"></div>
<div class="reveal"><div class="slides"></div></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.8.0/build/highlight.min.js"></script>

<script>
// md sera rempli par postMessage depuis Moodle
var md=null;
var slideMode=false,revealInitialized=false;

// Afficher l'écran d'attente tant que le markdown n'est pas reçu
document.getElementById('error-banner').style.display='block';
document.getElementById('error-banner').innerHTML=
  '<span style="opacity:.5">⏳ En attente du contenu depuis Moodle…</span>';

// Écoute le message postMessage envoyé par la page Moodle parente
window.addEventListener('message', function(event) {
  // Vérification basique du format du message
  if (!event.data || event.data.type !== 'cours-md') return;

  md = (event.data.content || '').trim();
  document.getElementById('error-banner').style.display='none';

  // Lancer le rendu une fois le markdown reçu
  if(window.location.search.includes('print-pdf')){
    document.getElementById('toolbar').style.display='none';
    renderSlides();
  } else {
    renderDoc();
  }
});
marked.setOptions({highlight:function(code,lang){return hljs.highlightAuto(code,lang?[lang]:undefined).value;}});

var ICON_COPY='<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
var ICON_OK='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';

function addCopyButtons(root){
  root.querySelectorAll('pre').forEach(function(pre){
    if(pre.querySelector('.copy-btn')) return;
    var btn=document.createElement('button');
    btn.className='copy-btn';
    btn.innerHTML=ICON_COPY+'<span>Copier</span>';
    btn.addEventListener('click',function(){
      var text=(pre.querySelector('code')||pre).innerText;
      var done=function(){
        btn.innerHTML=ICON_OK+'<span>Copié !</span>';
        btn.classList.add('copied');
        setTimeout(function(){btn.innerHTML=ICON_COPY+'<span>Copier</span>';btn.classList.remove('copied');},2000);
      };
      if(navigator.clipboard){navigator.clipboard.writeText(text).then(done).catch(done);}else{done();}
    });
    pre.appendChild(btn);
  });
}

function transformMermaid(root){
  root.querySelectorAll('pre code.language-mermaid').forEach(function(el){
    var div=document.createElement('div');
    div.className='mermaid';
    div.textContent=el.textContent;
    el.closest('pre').replaceWith(div);
  });
  mermaid.run({nodes:root.querySelectorAll('.mermaid')});
}

function addLangBadges(root){
  root.querySelectorAll('pre code[class*="language-"]').forEach(function(el){
    var lang=Array.from(el.classList).find(function(c){return c.startsWith('language-');});
    if(lang) lang=lang.replace('language-','');
    if(lang&&lang!=='mermaid') el.closest('pre').setAttribute('data-lang',lang);
  });
}

function renderDoc(){
  document.documentElement.style.overflow='';
  document.body.style.overflow='';
  document.getElementById('doc').style.display='block';
  document.querySelector('.reveal').style.display='none';
  var docEl=document.getElementById('doc');
  docEl.innerHTML=marked.parse(md||'*Aucun contenu.*');
  transformMermaid(docEl);hljs.highlightAll();addLangBadges(docEl);addCopyButtons(docEl);
}

function renderSlides(){
  document.getElementById('doc').style.display='none';
  document.querySelector('.reveal').style.display='block';
  var container=document.querySelector('.slides');
  container.innerHTML='';
  (md||'').split(/^---$/m).forEach(function(s){
    var section=document.createElement('section');
    section.innerHTML=marked.parse(s);
    container.appendChild(section);
  });
  transformMermaid(container);hljs.highlightAll();addCopyButtons(container);
  if(!revealInitialized){
    Reveal.initialize({hash:false,slideNumber:true,transition:'slide',width:1100,height:700});
    revealInitialized=true;
  }else{Reveal.sync();Reveal.slide(0);}
}

function switchMode(){
  slideMode=!slideMode;
  var btn=document.getElementById('modeBtn');
  if(slideMode){renderSlides();btn.textContent='📄 Document';btn.classList.add('active');}
  else{renderDoc();btn.textContent='▶ Slides';btn.classList.remove('active');}
}
function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}
function printDoc(){if(slideMode) switchMode();setTimeout(function(){window.print();},300);}
function printSlides(){window.open(window.location.href.split('?')[0]+'?print-pdf','_blank');}

// L'initialisation se fait dans le listener postMessage ci-dessus.
// Ce bloc reste pour le cas où le fichier est ouvert directement
// (hors Moodle, ex: test local ou ?print-pdf direct)
if(window.location.search.includes('print-pdf') && !md){
  document.getElementById('toolbar').style.display='none';
  // Attendre le postMessage — rien à faire ici
}
</script>
</body>
</html>
